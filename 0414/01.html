<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태선택자</title>
    <!--  상태선택자  -->
    <style>
        input:enabled{
            background-color: rgb(173, 230, 221);
        }
        input:disabled{
            background-color: rgb(254, 255, 173);
        }
        input:focus{
            background-color: rgb(230, 173, 173);
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type="text"><br><br>

    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled><br><br>    
</body>
</html>
